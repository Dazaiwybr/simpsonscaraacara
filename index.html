<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simpsons Cara a Cara - Springfield Edition</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Sniglet:wght@800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Sniglet', 'Comic Sans MS', cursive;
            background: #5c9ced; /* Azul do céu de Springfield */
            background-image: radial-gradient(rgba(255,255,255,0.3) 15%, transparent 16%);
            background-size: 30px 30px;
            min-height: 100vh;
            overflow-x: hidden;
            color: #3d2100;
        }
        
        /* Nuvens da abertura dos Simpsons */
        @keyframes floatCloud {
            from { transform: translateX(-30vw); }
            to { transform: translateX(120vw); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .cloud {
            position: fixed;
            background: #ffffff;
            border-radius: 100px;
            pointer-events: none;
            z-index: 0;
            box-shadow: -4px 4px 0 rgba(0,0,0,0.1);
            animation: floatCloud 35s linear infinite;
        }
        .cloud::before, .cloud::after {
            content: ''; position: absolute; background: #ffffff; border-radius: 50%;
        }
        .cloud::before { width: 50px; height: 50px; top: -20px; left: 15px; }
        .cloud::after { width: 60px; height: 60px; top: -25px; right: 20px; }

        .container { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Intro Tradicional */
        .intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #5c9ced;
            display: flex; align-items: center; justify-content: center; z-index: 10000;
            transition: opacity 0.5s ease;
        }
        .intro-overlay.fade-out { opacity: 0; pointer-events: none; }
        .intro-content { text-align: center; }
        .intro-title { 
            font-size: clamp(2.5rem, 10vw, 4.5rem); 
            color: #ffd000; 
            text-shadow: 4px 4px 0 #3d2100, -4px -4px 0 #3d2100, 4px -4px 0 #3d2100, -4px 4px 0 #3d2100, 8px 8px 0 rgba(0,0,0,0.15);
            font-weight: 900;
            letter-spacing: -2px;
        }
        .intro-sub { color: white; font-size: 1.2rem; font-weight: bold; text-shadow: 2px 2px 0 #3d2100; margin-top: -10px; }
        
        /* Estilo Desenho Animado (Bordas Grossas) */
        .springfield-header {
            background: #ffd000;
            border: 4px solid #3d2100;
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 0 #3d2100;
            text-align: center;
        }
        .springfield-title { font-size: clamp(1.5rem, 6vw, 2.3rem); color: #fff; text-shadow: 3px 3px 0 #3d2100, -1px -1px 0 #3d2100, 1px -1px 0 #3d2100, -1px 1px 0 #3d2100; font-weight: 900; }
        .springfield-subtitle { color: #3d2100; font-size: 0.9rem; font-weight: bold; margin-top: 5px; }
        
        /* Cartões de Personagem */
        .character-card {
            background: #fff;
            border: 3px solid #3d2100;
            border-radius: 18px;
            padding: 10px;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-shadow: 0 6px 0 #3d2100;
            cursor: pointer;
            text-align: center;
        }
        .character-card:hover { transform: translateY(-4px); box-shadow: 0 10px 0 #3d2100; }
        .character-card img { width: 75px; height: 75px; object-fit: contain; margin-bottom: 5px; background: #ebf4fa; border-radius: 10px; padding: 5px; border: 2px solid #3d2100; }
        .character-name { font-weight: bold; color: #3d2100; font-size: 11px; display: block; word-wrap: break-word; }
        
        /* Painéis e Caixas de Diálogo */
        .panel {
            background: #fff;
            border: 4px solid #3d2100;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 8px 0 #3d2100;
            margin-bottom: 20px;
        }

        /* Botões Estilo Simpsons (Donut e Comic) */
        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border: 3px solid #3d2100;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 5px 0 #3d2100;
            transition: all 0.05s ease;
            margin: 8px;
            text-transform: uppercase;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #3d2100; }
        
        .btn-donut { background: #ff69b4; color: white; text-shadow: 2px 2px 0 #3d2100; } /* Rosa Donut */
        .btn-simpson { background: #ffd000; color: #3d2100; } /* Amarelo */
        .btn-krusty { background: #4ecdc4; color: white; text-shadow: 2px 2px 0 #3d2100; } /* Verde Krusty */
        .btn-danger { background: #ff4757; color: white; text-shadow: 2px 2px 0 #3d2100; } /* Vermelho */

        /* Inputs */
        input[type="text"], input[type="password"] {
            padding: 12px 20px;
            border-radius: 30px;
            border: 3px solid #3d2100;
            font-family: inherit;
            font-size: 1rem;
            margin: 8px;
            width: 85%;
            max-width: 300px;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
        }
        input:focus { outline: none; background: #fffde6; }
        
        .characters-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); 
            gap: 12px; 
            margin-top: 15px; 
            max-height: 380px; 
            overflow-y: auto; 
            padding: 5px;
        }
        
        .question-area, .response-area { 
            background: #fff6d1; 
            border: 3px solid #3d2100;
            border-radius: 20px; 
            padding: 15px;
            margin: 15px 0;
            box-shadow: 0 5px 0 #3d2100;
        }
        .question-area input { width: 60%; max-width: 400px; }
        
        .chat-area { 
            background: #231f20; /* Fundo escuro como o quadro negro da escola */
            color: #a3e2c9; 
            border: 4px solid #8c5837; /* Moldura de "madeira" */
            padding: 12px; 
            border-radius: 12px; 
            height: 110px; 
            overflow-y: auto; 
            margin-top: 15px;
            font-size: 0.85rem;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
        }
        
        .avatar-spin { 
            width: 70px; height: 70px; background: #ffd000; border: 3px solid #3d2100; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 2.2rem; 
            margin: 0 auto 12px; box-shadow: 0 5px 0 #3d2100;
            animation: bounce 2s infinite;
        }
        
        .turn-indicator { padding: 8px 20px; border-radius: 50px; font-weight: bold; border: 2px solid #3d2100; box-shadow: 0 3px 0 #3d2100; }
        .turn-mine { background: #7bed9f; color: #3d2100; }
        .turn-opponent { background: #ff6b81; color: white; }
        
        .toast { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: #3d2100; color: #ffd000; padding: 10px 25px; border-radius: 50px; 
            z-index: 3000; font-weight: bold; font-size: 0.9rem; border: 2px solid #ffd000;
        }

        .room-code-display { font-size: 2.2rem; font-weight: 900; background: #ff69b4; color: white; border: 3px solid #3d2100; padding: 10px; border-radius: 20px; text-align: center; letter-spacing: 5px; margin: 15px 0; box-shadow: 0 5px 0 #3d2100; text-shadow: 2px 2px 0 #3d2100; }
        .waiting-spinner { width: 40px; height: 40px; border: 5px solid #fff; border-top-color: #ffd000; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 15px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Modal de vitória */
        .victory-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(92, 156, 237, 0.95); display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .victory-card {
            background: #ffd000; border-radius: 30px; padding: 40px 30px; text-align: center; max-width: 400px; width: 90%; border: 5px solid #3d2100; box-shadow: 0 12px 0 #3d2100;
        }
        .victory-card h2 { font-size: 2.8rem; color: #fff; text-shadow: 3px 3px 0 #3d2100; -webkit-text-stroke: 1px #3d2100; margin-bottom: 15px; }
        .victory-card p { font-size: 1.2rem; font-weight: bold; margin-bottom: 25px; }
        .victory-emoji { font-size: 5rem; animation: bounce 1s infinite; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fffde6; border-radius: 10px; border-left: 2px solid #3d2100; }
        ::-webkit-scrollbar-thumb { background: #ffd000; border-radius: 10px; border: 2px solid #3d2100; }
    </style>
</head>
<body>

    <div class="intro-content">
        <div class="intro-title">The SIMPSONS</div>
        <div class="intro-sub">CARA A CARA • ONLINE</div>

</div>

<div id="app"></div>

<script>

        { id: 3, nome: 'Bart Simpson', genero: 'M', idade: 'crianca', oculos: false, cabelo: 'espetado', roupa: 'laranja', familia: true, img: 'https://upload.wikimedia.org/wikipedia/en/a/aa/Bart_Simpson_200px.png' },

        { id: 7, nome: 'Ned Flanders', genero: 'M', idade: 'adulto', oculos: true, cabelo: 'castanho', roupa: 'verde', familia: false, img: 'https://upload.wikimedia.org/wikipedia/en/8/84/Ned_Flanders.png' },

        { id: 9, nome: 'Mr. Burns', genero: 'M', idade: 'idoso', oculos: false, cabelo: 'careca', roupa: 'cinza', familia: false, img: 'https://upload.wikimedia.org/wikipedia/en/5/56/Mr_Burns.png' },
        { id: 10, nome: 'Nelson', genero: 'M', idade: 'crianca', oculos: false, cabelo: 'azul', roupa: 'camisa', familia: false, img: 'https://upload.wikimedia.org/wikipedia/en/c/c6/Nelson_Muntz.PNG' },
        { id: 11, nome: 'Milhouse', genero: 'M', idade: 'crianca', oculos: true, cabelo: 'azul', roupa: 'azul', familia: false, img: 'https://upload.wikimedia.org/wikipedia/en/1/11/Milhouse_Van_Houten.png' },
        { id: 12, nome: 'Apu', genero: 'M', idade: 'adulto', oculos: false, cabelo: 'preto', roupa: 'branco', familia: false, img: 'https://upload.wikimedia.org/wikipedia/en/2/23/Apu_Nahasapeemapetilon.png' },
        { id: 13, nome: 'Chefe Wiggum', genero: 'M', idade: 'adulto', oculos: false, cabelo: 'careca', roupa: 'azul', familia: false, img: 'https://upload.wikimedia.org/wikipedia/en/e/e4/Clancy_Wiggum.png' },
        { id: 14, nome: 'Skinner', genero: 'M', idade: 'adulto', oculos: false, cabelo: 'ralo', roupa: 'marrom', familia: false, img: 'https://upload.wikimedia.org/wikipedia/en/2/26/Principal_Skinner.png' },
        { id: 15, nome: 'Ralph', genero: 'M', idade: 'crianca', oculos: false, cabelo: 'espetado', roupa: 'amarelo', familia: false, img: 'https://upload.wikimedia.org/wikipedia/en/2/2a/Ralph_Wiggum.png' },
        { id: 16, nome: 'Comic Guy', genero: 'M', idade: 'adulto', oculos: true, cabelo: 'escuro', roupa: 'roxo', familia: false, img: 'https://upload.wikimedia.org/wikipedia/en/b/ba/Comic_Book_Guy.png' },
        { id: 17, nome: 'Frink', genero: 'M', idade: 'adulto', oculos: true, cabelo: 'careca', roupa: 'branco', familia: false, img: 'https://upload.wikimedia.org/wikipedia/en/5/56/Professor_Frink.png' },
        { id: 18, nome: 'Patty', genero: 'F', idade: 'adulto', oculos: false, cabelo: 'azul', roupa: 'verde', familia: false, img: 'https://upload.wikimedia.org/wikipedia/en/f/f3/Patty_Bouvier.png' },
        { id: 19, nome: 'Selma', genero: 'F', idade: 'adulto', oculos: false, cabelo: 'azul', roupa: 'verde', familia: false, img: 'https://upload.wikimedia.org/wikipedia/en/2/25/Selma_Bouvier.png' },
        { id: 20, nome: 'Willie', genero: 'M', idade: 'adulto', oculos: false, cabelo: 'ruivo', roupa: 'verde', familia: false, img: 'https://upload.wikimedia.org/wikipedia/en/5/5b/Groundskeeper_Willie.png' }
    ];

    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyATdGCu7aiCX-JSCpr2gvsS_GBYSl_cSUs",
        authDomain: "babydoll-38338.firebaseapp.com",
        databaseURL: "https://babydoll-38338-default-rtdb.firebaseio.com",
        projectId: "babydoll-38338",
        storageBucket: "babydoll-38338.firebasestorage.app",
        messagingSenderId: "532837179930",
        appId: "1:532837179930:web:9bca40773fb2304b23e7a3"
    };
    
    let db = null;
    try {
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        }
    } catch(e) { console.log("Firebase error:", e); }

    let usuarioAtual = null;
    let usuarios = JSON.parse(localStorage.getItem('simpsons_usuarios') || '[]');
    let salaListener = null;
    let meuId = Math.random().toString(36).substring(2, 8);

    function toast(msg) { 
        const t=document.createElement('div'); t.className='toast'; t.innerText=msg; 
        document.body.appendChild(t); setTimeout(()=>t.remove(),2000); 
    }
    function salvarUsuarios() { localStorage.setItem('simpsons_usuarios', JSON.stringify(usuarios)); }
    function setUsuario(user) { usuarioAtual = user; localStorage.setItem('simpsons_atual', JSON.stringify(user)); }

    const app = document.getElementById('app');
    setTimeout(() => { 
        const intro = document.getElementById('introScreen'); 
        if(intro) { intro.classList.add('fade-out'); setTimeout(()=>intro.remove(),600); } 
    }, 1200);

    // Gerar Nuvens Estilo Abertura
    for(let i=0;i<8;i++){ 
        const c=document.createElement('div'); 
        c.className='cloud'; 
        c.style.cssText=`width:${100+Math.random()*120}px;height:${35+Math.random()*25}px;top:${10+Math.random()*60}%;left:-150px;animation-delay:${Math.random()*20}s;animation-duration:${25+Math.random()*20}s;`; 
        document.body.appendChild(c); 
    }

    // ==================== TELAS ====================
    function telaPrincipal() {
        app.innerHTML = `
        <div class="container screen fadeIn">
            <div class="springfield-header">
                <div class="springfield-title">🍩 CARA A CARA 🍩</div>
                <div class="springfield-subtitle">Springfield Multiplayer Edition</div>
            </div>
            <div class="panel" style="text-align:center;">
                <p style="margin-bottom:15px; font-weight:bold;">Bem-vindo ao jogo definitivo de adivinhação online!</p>
                <button class="btn btn-donut" id="btnJogar">🍩 ENTRAR NO JOGO</button>
            </div>
        </div>`;
        document.getElementById('btnJogar')?.addEventListener('click', () => {
            const salvo = localStorage.getItem('simpsons_atual');
            if(salvo) { usuarioAtual = JSON.parse(salvo); telaPerfil(); } else { telaLogin(); }
        });
    }

    function telaLogin() {
        app.innerHTML = `
        <div class="container screen fadeIn">
            <div class="springfield-header"><div class="springfield-title">🏪 TAVERNA DO MOE</div></div>
            <div class="panel" style="text-align:center;">
                <div class="avatar-spin">🍺</div>
                <input type="text" id="loginNome" placeholder="Seu nome de usuário"><br>
                <input type="password" id="loginSenha" placeholder="Sua Senha"><br>
                <button class="btn btn-simpson" id="btnEntrar">Entrar</button>
                <button class="btn btn-krusty" id="btnCadastrar">Criar Nova Conta</button>
            </div>
        </div>`;
        document.getElementById('btnEntrar')?.addEventListener('click', () => {
            const nome = document.getElementById('loginNome').value.trim();
            const senha = document.getElementById('loginSenha').value;
            const user = usuarios.find(u => u.nome === nome && u.senha === senha);
            if(user) { setUsuario(user); telaPerfil(); } else toast('Nome ou senha incorretos, cara!');
        });
        document.getElementById('btnCadastrar')?.addEventListener('click', telaRegistro);
    }

    function telaRegistro() {
        app.innerHTML = `
        <div class="container screen fadeIn">
            <div class="springfield-header"><div class="springfield-title">📝 REGISTRO EM SPRINGFIELD</div></div>
            <div class="panel" style="text-align:center;">
                <div id="avatarPrev" class="avatar-spin">🛹</div>
                <p style="font-weight:bold; font-size:0.9rem;">Escolha seu ícone de perfil:</p>
                <div style="margin:10px 0;">${['🛹','🎷','🍩','🍺','👮','🤓','🐱','🤡'].map(e=>`<span style="font-size:1.8rem; margin:6px; cursor:pointer; display:inline-block;" onclick="document.getElementById('avatarPrev').innerText='${e}'">${e}</span>`).join('')}</div>
                <input type="text" id="regNome" placeholder="Nome do Cidadão"><br>
                <input type="password" id="regSenha" placeholder="Senha Secreta"><br>
                <button class="btn btn-krusty" id="btnRegistrar">Criar Cidadão</button>
                <button class="btn btn-danger" id="btnVoltarLogin">Cancelar</button>
            </div>
        </div>`;
        document.getElementById('btnRegistrar')?.addEventListener('click', () => {
            const nome = document.getElementById('regNome').value.trim();
            const senha = document.getElementById('regSenha').value;
            const avatar = document.getElementById('avatarPrev').innerText;
            if(!nome||!senha) { toast('Preencha todos os campos!'); return; }
            if(usuarios.find(u=>u.nome===nome)) { toast('Esse nome já está em uso!'); return; }
            usuarios.push({ nome, senha, avatar, pontos: 0 });
            salvarUsuarios();
            setUsuario({ nome, senha, avatar, pontos: 0 });
            telaPerfil();
        });
        document.getElementById('btnVoltarLogin')?.addEventListener('click', telaLogin);
    }

    function telaPerfil() {
        app.innerHTML = `
        <div class="container screen fadeIn">
            <div class="springfield-header"><div class="springfield-title">🏡 SEU PERFIL</div></div>
            <div class="panel" style="text-align:center;">
                <div class="avatar-spin">${usuarioAtual.avatar}</div>
                <h2 style="margin-bottom:5px;">${usuarioAtual.nome}</h2>
                <p style="color:#ff69b4; font-weight:bold; font-size:1.1rem; margin-bottom:15px;">⭐ ${usuarioAtual.pontos||0} Rosquinhas Coletadas</p>
                <button class="btn btn-donut" id="btnOnline"><span class="online-status"></span> 🌍 PROCURAR PARTIDA</button><br>
                <button class="btn btn-danger" id="btnSair">Desconectar</button>
            </div>
        </div>`;
        document.getElementById('btnOnline')?.addEventListener('click', () => { if(db) { lobbyOnline(); } else { toast('Firebase desconectado!'); } });
        document.getElementById('btnSair')?.addEventListener('click', () => { localStorage.removeItem('simpsons_atual'); telaPrincipal(); });
    }

    function lobbyOnline() {
        app.innerHTML = `
        <div class="container screen fadeIn">
            <div class="springfield-header"><div class="springfield-title">☢️ USINA NUCLEAR (LOBBY)</div></div>
            <div class="panel" style="text-align:center;">
                <p style="font-weight:bold; margin-bottom:15px;">Crie um novo setor de jogo ou digite o código de um amigo!</p>
                <button class="btn btn-donut" id="btnCriarSala">➕ CRIAR NOVA SALA</button>
                <div style="margin:20px 0; border-top: 2px dashed #3d2100; padding-top:20px;">
                    <input type="text" id="codigoSala" placeholder="CÓDIGO" maxlength="6" style="text-transform:uppercase; text-align:center; font-weight:bold;"><br>
                    <button class="btn btn-krusty" id="btnEntrarSala">🔗 CONECTAR NA SALA</button>
                </div>
                <button class="btn btn-danger" id="btnVoltarPerfil">Voltar ao Painel</button>
            </div>
        </div>`;
        document.getElementById('btnCriarSala')?.addEventListener('click', () => {
            const codigo = Math.random().toString(36).substring(2,8).toUpperCase();
            const aleatorio = SIMPSONS[Math.floor(Math.random() * SIMPSONS.length)];
            db.ref(`salas/${codigo}`).set({
                codigo, criador: usuarioAtual.nome, criadorId: meuId, criadorSecreto: aleatorio.id,
                convidado: null, convidadoId: null, convidadoSecreto: null,
                disponiveisCriador: SIMPSONS.map(c=>c.id), disponiveisConvidado: SIMPSONS.map(c=>c.id),
                vez: 'criador', status: 'espera', vencedor: null, perguntaAtual: null, respostaAtual: null
            });
            toast(`Setor ${codigo} aberto!`);
            iniciarJogo(codigo, true);
        });
        document.getElementById('btnEntrarSala')?.addEventListener('click', () => { const cod=document.getElementById('codigoSala').value.trim().toUpperCase(); if(cod) entrarSala(cod); else toast('Insira um código válido!'); });
        document.getElementById('btnVoltarPerfil')?.addEventListener('click', () => telaPerfil());
    }

    function entrarSala(codigo) {
        db.ref(`salas/${codigo}`).once('value', (snapshot) => {
            const sala = snapshot.val();
            if(!sala) { toast('Sala radioativa não encontrada!'); return; }
            if(sala.convidado) { toast('Essa sala já explodiu de tão cheia!'); return; }
            const aleatorio = SIMPSONS[Math.floor(Math.random() * SIMPSONS.length)];
            db.ref(`salas/${codigo}`).update({ convidado: usuarioAtual.nome, convidadoId: meuId, convidadoSecreto: aleatorio.id, status: 'jogando' });
            toast(`Conectado com sucesso!`);
            iniciarJogo(codigo, false);
        });
    }

    function iniciarJogo(codigo, souCriador) {
        if(salaListener) salaListener.off();
        salaListener = db.ref(`salas/${codigo}`);
        salaListener.on('value', (snapshot) => {
            const sala = snapshot.val();
            if(!sala) { toast('A partida foi destruída!'); if(salaListener) salaListener.off(); telaPerfil(); return; }
            if(souCriador && !sala.convidado) {
                app.innerHTML = `
                <div class="container screen fadeIn">
                    <div class="springfield-header"><div class="springfield-title">⏳ AGUARDANDO OPONENTE</div></div>
                    <div class="panel" style="text-align:center;">
                        <div class="waiting-spinner"></div>
                        <p style="font-weight:bold; margin-bottom:10px;">Diga para o seu oponente digitar o código abaixo:</p>
                        <div class="room-code-display">${codigo}</div>
                        <button class="btn btn-danger" id="btnCancelar">Fechar Setor</button>
                    </div>
                </div>`;
                document.getElementById('btnCancelar')?.addEventListener('click', () => { if(salaListener) salaListener.off(); db.ref(`salas/${codigo}`).remove(); telaPerfil(); });
                return;
            }
            if(sala.vencedor) {
                mostrarVitoria(sala.vencedor === usuarioAtual.nome, sala.vencedor);
                if(salaListener) salaListener.off();
                return;
            }
            renderizarJogo(sala, souCriador);
        });
    }

    function mostrarVitoria(ganhei, nomeVencedor) {
        if(ganhei) {
            usuarioAtual.pontos = (usuarioAtual.pontos || 0) + 1;
            const idx = usuarios.findIndex(u => u.nome === usuarioAtual.nome);
            if(idx !== -1) { usuarios[idx].pontos = usuarioAtual.pontos; salvarUsuarios(); setUsuario(usuarioAtual); }
        }

        app.innerHTML = `
        <div class="victory-overlay">
            <div class="victory-card">
                <div class="victory-emoji">${ganhei ? '🍩' : '☠️'}</div>
                <h2>${ganhei ? 'YEE-HAW! GANHOU!' : 'OUCH! PERDEU!'}</h2>
                <p>${ganhei ? 'Excelente! Você ganhou mais uma rosquinha!' : `O espertinho do <b>${nomeVencedor}</b> adivinhou primeiro.`}</p>
                <button class="btn btn-donut" onclick="telaPerfil()">Voltar para a Cidade</button>
            </div>
        </div>`;
    }

    function renderizarJogo(sala, souCriador) {
        const oponente = souCriador ? sala.convidado : sala.criador;
        const minhaVez = (souCriador && sala.vez === 'criador') || (!souCriador && sala.vez === 'convidado');
        const meusIdsDisponiveis = souCriador ? sala.disponiveisCriador : sala.disponiveisConvidado;
        const meuSegredoId = souCriador ? sala.criadorSecreto : sala.convidadoSecreto;
        const meuPersonagemObjeto = SIMPSONS.find(p => p.id === meuSegredoId);

        let gridHtml = '';
        for(const p of SIMPSONS) {
            const estaAtivo = meusIdsDisponiveis.includes(p.id);
            gridHtml += `
            <div class="character-card" style="${estaAtivo ? '' : 'opacity: 0.2; filter: grayscale(1); pointer-events:none; transform:scale(0.95);'}" onclick="eliminar('${sala.codigo}', ${p.id}, ${souCriador})">
                <img src="${p.img}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23ffd000%22 stroke=%22%233d2100%22 stroke-width=%224%22/%3E%3Ctext x=%2250%22 y=%2265%22 text-anchor=%22middle%22 fill=%22%233d2100%22 font-size=%2235%22 font-family=%22sans-serif%22 font-weight=%22bold%22%3E${p.nome.charAt(0)}%3C/text%3E%3C/svg%3E'">
                <span class="character-name">${p.nome}</span>
            </div>`;
        }

        let areaInteracaoHtml = '';
        if (sala.perguntaAtual) {
            if (!minhaVez) { 
                areaInteracaoHtml = `
                <div class="response-area">
                    <p style="font-size:1.1rem; font-weight:bold; margin-bottom:12px;">🤔 ${oponente} pergunta: "<b>${sala.perguntaAtual}</b>"</p>
                    <button class="btn btn-krusty" onclick="responder('${sala.codigo}', 'SIM', ${souCriador})">👍 SIM</button>
                    <button class="btn btn-danger" onclick="responder('${sala.codigo}', 'NÃO', ${souCriador})">👎 NÃO</button>
                </div>`;
            } else {
                areaInteracaoHtml = `
                <div class="response-area">
                    <p style="color:#3d2100; font-weight:bold;">⏳ Aguardando resposta de ${oponente} para: "<i>${sala.perguntaAtual}</i>"</p>
                </div>`;
            }
        } else {
            if (minhaVez) {
                areaInteracaoHtml = `
                <div class="question-area">
                    <input type="text" id="perguntaInput" placeholder="Ex: Tem cabelo azul? Usa óculos?">
                    <button id="btnPerguntar" class="btn btn-simpson" style="margin:0; padding:10px 20px;">❓ PERGUNTAR</button>
                </div>
                <div class="panel" style="margin-top:10px; padding:12px; text-align:center;">
                    <input type="text" id="chuteInput" placeholder="Dar um chute definitivo...">
                    <button id="btnChutar" class="btn btn-donut" style="margin:0; padding:10px 20px;">🎯 REVELAR CHUTE</button>
                </div>`;
            } else {
                areaInteracaoHtml = `
                <div class="response-area">
                    <p style="color:#ff4757; font-weight:bold; animation: bounce 1s infinite;">⏳ ${oponente} está formulando a próxima pergunta...</p>
                </div>`;
            }
        }

        app.innerHTML = `
        <div class="container screen fadeIn">
            <div class="springfield-header">
                <div class="springfield-title">📺 PARTIDA ONLINE</div>
                <div class="springfield-subtitle">Seu personagem secreto para o rival adivinhar: <b style="color:#ff69b4; text-shadow:1px 1px 0 #000;">${meuPersonagemObjeto ? meuPersonagemObjeto.nome : 'Sorteando...'}</b></div>
            </div>
            
            <div class="panel" style="padding:15px;">
                <div class="flex-between" style="margin-bottom:12px;">
                    <span style="font-weight:bold;">👤 ${usuarioAtual.nome}</span>
                    <span class="turn-indicator ${minhaVez?'turn-mine':'turn-opponent'}">${minhaVez?'✨ SUA VEZ DE JOGAR ✨':'⏳ VEZ DO RIVAL'}</span>
                    <span style="font-weight:bold;">👤 ${oponente}</span>
                </div>
                
                ${areaInteracaoHtml}

                <div style="margin-top:15px;">
                    <h4 style="text-align:center; margin-bottom:10px; font-size:1rem; color:#3d2100;">🎯 Clique nos suspeitos abaixo para eliminá-los do seu painel:</h4>
                    <div class="characters-grid">${gridHtml}</div>
                </div>
                
                <div class="chat-area">
                    <div><b>Quadro Escolar de Springfield (Histórico):</b></div>
                    <div style="margin-top:5px; color:#ffd000;">✏️ ${sala.respostaAtual || 'Nenhuma pergunta respondida ainda nesta rodada.'}</div>
                </div>
                <div style="text-align:center; margin-top:15px;">
                    <button class="btn btn-danger" id="btnSairJogo">Abandonar Partida</button>
                </div>
            </div>
        </div>`;

        // Listeners
        document.getElementById('btnPerguntar')?.addEventListener('click', () => {
            const pergunta = document.getElementById('perguntaInput').value.trim();
            if(!pergunta) return;
            db.ref(`salas/${sala.codigo}`).update({ perguntaAtual: pergunta });
        });

        document.getElementById('btnChutar')?.addEventListener('click', () => {
            const chute = document.getElementById('chuteInput').value.trim();
            if(!chute) return;
            
            const segredoOponente = souCriador ? sala.convidadoSecreto : sala.criadorSecreto;
            const personagemSecreto = SIMPSONS.find(p => p.id === segredoOponente);
            
            if(chute.toLowerCase() === personagemSecreto.nome.toLowerCase()) {
                db.ref(`salas/${sala.codigo}`).update({ vencedor: usuarioAtual.nome });
            } else {
                toast(`❌ Resposta Errada!`);
                const proximaVez = souCriador ? 'convidado' : 'criador';
                db.ref(`salas/${sala.codigo}`).update({ vez: proximaVez, respostaAtual: `${usuarioAtual.nome} arriscou um palpite em "${chute}" e ERROU feio!` });
            }
        });

        document.getElementById('btnSairJogo')?.addEventListener('click', () => { 
            if(salaListener) salaListener.off(); 
            db.ref(`salas/${sala.codigo}`).remove(); 
            telaPerfil(); 
        });
    }

    window.responder = (codigo, resposta, souCriador) => {
        db.ref(`salas/${codigo}`).once('value', (snapshot) => {
            const sala = snapshot.val();
            if (!sala) return;
            const quemPerguntou = souCriador ? sala.convidado : sala.criador;
            const textoAcao = `<b>${quemPerguntou}</b> perguntou se o suspeito "${sala.perguntaAtual}". Resposta: <b>${resposta}</b>`;
            const proximaVez = souCriador ? 'criador' : 'convidado';
            db.ref(`salas/${codigo}`).update({ perguntaAtual: null, respostaAtual: textoAcao, vez: proximaVez });
        });
    };

    window.eliminar = (codigo, id, souCriador) => {
        db.ref(`salas/${codigo}`).once('value', (snapshot) => {
            const sala = snapshot.val();
            if(!sala || sala.vencedor) return;
            const listaOriginal = souCriador ? sala.disponiveisCriador : sala.disponiveisConvidado;
            const novaLista = listaOriginal.filter(i => i !== id);
            if(souCriador) {
                db.ref(`salas/${codigo}`).update({ disponiveisCriador: novaLista });
            } else {
                db.ref(`salas/${codigo}`).update({ disponiveisConvidado: novaLista });
            }
        });
    };

    telaPrincipal();
</script>
</body>
</html>
